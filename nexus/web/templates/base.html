<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page_title }} - Nexus{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nexus: {
                            purple: {
                                600: '#7C3AED',
                                500: '#8B5CF6',
                                400: '#A78BFA',
                                300: '#C4B5FD',
                                200: '#DDD6FE',
                            }
                        }
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Google Fonts - JetBrains Mono for CLI View -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased"
      x-data="{
          // Persistent state using localStorage
          cliViewOpen: localStorage.getItem('nexus_cliViewOpen') === 'true' || false,
          sidebarOpen: true,
          cliActions: JSON.parse(localStorage.getItem('nexus_cliActions') || '[]'),
          verbosity: localStorage.getItem('nexus_verbosity') || 'normal',

          // Initialize watchers for persistence
          init() {
              // Watch cliViewOpen and save to localStorage
              this.$watch('cliViewOpen', value => {
                  localStorage.setItem('nexus_cliViewOpen', value);
              });

              // Watch verbosity and save to localStorage
              this.$watch('verbosity', value => {
                  localStorage.setItem('nexus_verbosity', value);
              });

              // Watch cliActions and save to localStorage (keep last 50)
              this.$watch('cliActions', value => {
                  const actionsToSave = value.slice(-50);
                  localStorage.setItem('nexus_cliActions', JSON.stringify(actionsToSave));
              });
          }
      }">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-gray-800 border-b border-gray-700 z-50">
        <div class="h-full px-4 flex items-center justify-between">
            <!-- Logo & Brand -->
            <div class="flex items-center space-x-4">
                <button @click="sidebarOpen = !sidebarOpen"
                        class="p-2 hover:bg-gray-700 rounded-lg lg:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-purple-400 rounded-lg flex items-center justify-center font-bold text-white">
                        N
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-purple-400 to-purple-600 bg-clip-text text-transparent">
                        NEXUS
                    </span>
                </div>
            </div>

            <!-- Navigation (Desktop) -->
            <nav class="hidden md:flex items-center space-x-1">
                <a href="/" class="px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'dashboard' %}bg-gray-700 text-purple-400{% endif %}">
                    Dashboard
                </a>
                <a href="/nodes" class="px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'nodes' %}bg-gray-700 text-purple-400{% endif %}">
                    Nodes
                </a>
                <a href="/jobs" class="px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'jobs' %}bg-gray-700 text-purple-400{% endif %}">
                    Jobs
                </a>
                <a href="/logs" class="px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'logs' %}bg-gray-700 text-purple-400{% endif %}">
                    Logs
                </a>
            </nav>

            <!-- Actions -->
            <div class="flex items-center space-x-2">
                <a href="/settings" class="p-2 hover:bg-gray-700 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </a>

                <!-- CLI View Toggle -->
                <button @click="cliViewOpen = !cliViewOpen"
                        :class="cliViewOpen ? 'bg-purple-600 text-white' : 'hover:bg-gray-700'"
                        class="p-2 rounded-lg transition-colors duration-200"
                        title="Toggle CLI View">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex pt-16 h-screen">

        <!-- Sidebar -->
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
               class="fixed lg:static w-64 h-full bg-gray-800 border-r border-gray-700 transform transition-transform duration-200 ease-in-out z-40">
            <div class="p-4 space-y-2">
                <!-- Mobile Navigation -->
                <nav class="md:hidden space-y-1 pb-4 mb-4 border-b border-gray-700">
                    <a href="/" class="block px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'dashboard' %}bg-gray-700 text-purple-400{% endif %}">
                        Dashboard
                    </a>
                    <a href="/nodes" class="block px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'nodes' %}bg-gray-700 text-purple-400{% endif %}">
                        Nodes
                    </a>
                    <a href="/jobs" class="block px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'jobs' %}bg-gray-700 text-purple-400{% endif %}">
                        Jobs
                    </a>
                    <a href="/logs" class="block px-4 py-2 rounded-lg hover:bg-gray-700 {% if active_page == 'logs' %}bg-gray-700 text-purple-400{% endif %}">
                        Logs
                    </a>
                </nav>

                <!-- Fleet Status -->
                <div class="bg-gray-700/50 rounded-lg p-4">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase mb-2">Fleet Status</h3>
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Nodes</span>
                            <span class="text-green-400 font-semibold" id="sidebar-nodes-count">-</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Online</span>
                            <span class="text-green-400 font-semibold" id="sidebar-online-count">-</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Jobs Running</span>
                            <span class="text-blue-400 font-semibold" id="sidebar-jobs-count">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content + CLI View -->
        <div class="flex-1 flex overflow-hidden">

            <!-- Main Content Area -->
            <main :class="cliViewOpen ? 'flex-1' : 'w-full'" class="overflow-y-auto p-6 transition-all duration-200">
                {% block content %}{% endblock %}
            </main>

            <!-- CLI View Panel -->
            <aside x-show="cliViewOpen"
                   x-transition:enter="transform transition ease-out duration-200"
                   x-transition:enter-start="translate-x-full"
                   x-transition:enter-end="translate-x-0"
                   x-transition:leave="transform transition ease-in duration-200"
                   x-transition:leave-start="translate-x-0"
                   x-transition:leave-end="translate-x-full"
                   class="w-96 bg-gray-800 border-l border-gray-700 flex flex-col"
                   style="display: none;">

                <!-- CLI View Header -->
                <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <h3 class="font-semibold">CLI View</h3>
                    </div>
                    <div class="flex items-center space-x-2">
                        <!-- Verbosity selector -->
                        <select x-model="verbosity" class="bg-gray-700 text-sm rounded px-2 py-1 border border-gray-600">
                            <option value="compact">Compact</option>
                            <option value="normal">Normal</option>
                            <option value="verbose">Verbose</option>
                        </select>
                        <button @click="cliActions = []" class="p-1 hover:bg-gray-700 rounded" title="Clear history">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- CLI View Content -->
                <div class="flex-1 overflow-y-auto p-4 font-mono text-sm space-y-3" id="cli-view-content">
                    <template x-if="cliActions.length === 0">
                        <div class="text-gray-500 text-center py-8">
                            <p>No actions yet</p>
                            <p class="text-xs mt-2">Click anything to see the equivalent CLI command</p>
                        </div>
                    </template>

                    <template x-for="action in cliActions.slice().reverse()" :key="action.id">
                        <div class="bg-gray-900 rounded-lg p-3 border border-gray-700 space-y-1">
                            <!-- CLI Command -->
                            <div class="flex items-start justify-between">
                                <code class="text-purple-400" x-text="'$ ' + action.cliCommand"></code>
                                <button @click="navigator.clipboard.writeText(action.cliCommand)"
                                        class="p-1 hover:bg-gray-700 rounded"
                                        title="Copy command">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    </svg>
                                </button>
                            </div>

                            <!-- API Call (normal/verbose) -->
                            <template x-if="verbosity !== 'compact'">
                                <div class="text-gray-400 text-xs space-y-0.5">
                                    <div x-text="'↓ ' + action.apiCall.method + ' ' + action.apiCall.endpoint"></div>
                                    <div :class="{
                                        'text-green-400': action.response.status >= 200 && action.response.status < 300,
                                        'text-amber-400': action.response.status >= 400 && action.response.status < 500,
                                        'text-red-400': action.response.status >= 500
                                    }" x-text="'← ' + action.response.status + ' ' + action.response.statusText + ' (' + action.response.timing + 'ms)'"></div>
                                </div>
                            </template>

                            <!-- Summary -->
                            <div class="text-gray-300 text-xs" x-text="action.summary"></div>

                            <!-- Verbose details (expandable) -->
                            <template x-if="verbosity === 'verbose'">
                                <details class="text-xs">
                                    <summary class="text-gray-500 cursor-pointer hover:text-gray-400">Show details</summary>
                                    <div class="mt-2 space-y-2">
                                        <div>
                                            <div class="text-gray-500">Request:</div>
                                            <pre class="text-gray-400 text-xs overflow-x-auto" x-text="JSON.stringify(action.apiCall.body, null, 2)"></pre>
                                        </div>
                                        <div>
                                            <div class="text-gray-500">Response:</div>
                                            <pre class="text-gray-400 text-xs overflow-x-auto max-h-32" x-text="JSON.stringify(action.response.body, null, 2)"></pre>
                                        </div>
                                    </div>
                                </details>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Auto-scroll Toggle -->
                <div class="p-3 border-t border-gray-700">
                    <label class="flex items-center space-x-2 text-sm cursor-pointer">
                        <input type="checkbox" checked class="rounded bg-gray-700 border-gray-600 text-purple-600 focus:ring-purple-500">
                        <span>Auto-scroll to new actions</span>
                    </label>
                </div>

            </aside>
        </div>
    </div>

    <!-- CLI View JavaScript -->
    <script src="/static/js/cli-view.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
