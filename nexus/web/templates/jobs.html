{% extends "base.html" %}

{% block content %}
<div class="space-y-6" x-data="jobsPage()">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold">Jobs</h1>
            <p class="text-gray-400 mt-1">Job queue and execution history</p>
        </div>
        <button @click="showSubmitForm = true" class="btn-primary">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Submit Job
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="card">
            <div class="card-body">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Total Jobs</p>
                        <p class="text-2xl font-bold mt-1" x-text="stats.total">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-600/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Running</p>
                        <p class="text-2xl font-bold mt-1" x-text="stats.running">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-600/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Completed</p>
                        <p class="text-2xl font-bold mt-1" x-text="stats.completed">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-600/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Failed</p>
                        <p class="text-2xl font-bold mt-1" x-text="stats.failed">0</p>
                    </div>
                    <div class="w-12 h-12 bg-red-600/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="card">
        <div class="border-b border-gray-700 px-6">
            <nav class="flex space-x-8" aria-label="Tabs">
                <button @click="filterStatus = 'all'"
                        :class="filterStatus === 'all' ? 'border-purple-500 text-purple-500' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    All Jobs
                </button>
                <button @click="filterStatus = 'running'"
                        :class="filterStatus === 'running' ? 'border-purple-500 text-purple-500' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    Running
                </button>
                <button @click="filterStatus = 'completed'"
                        :class="filterStatus === 'completed' ? 'border-purple-500 text-purple-500' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    Completed
                </button>
                <button @click="filterStatus = 'failed'"
                        :class="filterStatus === 'failed' ? 'border-purple-500 text-purple-500' : 'border-transparent text-gray-400 hover:text-gray-300'"
                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    Failed
                </button>
            </nav>
        </div>

        <!-- Jobs Table -->
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-800/50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Type</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Node</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Command</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Created</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Duration</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-700">
                    <template x-for="job in filteredJobs" :key="job.id">
                        <tr class="hover:bg-gray-800/50 cursor-pointer" @click="selectedJob = job">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="status-badge" :class="`status-${job.status}`" x-text="job.status"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="text-sm font-mono uppercase" x-text="job.type"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="text-sm" x-text="getNodeName(job.node_id)"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-sm font-mono text-gray-300" x-text="getJobCommand(job)"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400" x-text="formatDate(job.created_at)"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400" x-text="getJobDuration(job)"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <button @click.stop="viewJobDetails(job)" class="text-purple-500 hover:text-purple-400">
                                    Details
                                </button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>

            <!-- Empty State -->
            <div x-show="filteredJobs.length === 0" class="text-center py-12 text-gray-500">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                <p class="font-semibold">No jobs found</p>
                <p class="text-sm mt-2">Submit a job to get started</p>
            </div>
        </div>
    </div>

    <!-- Job Details Modal -->
    <div x-show="selectedJob"
         x-cloak
         @click.self="selectedJob = null"
         class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <template x-if="selectedJob">
                <div>
                    <!-- Modal Header -->
                    <div class="flex items-center justify-between p-6 border-b border-gray-700">
                        <div class="flex items-center space-x-4">
                            <h3 class="text-xl font-bold">Job Details</h3>
                            <span class="status-badge" :class="`status-${selectedJob.status}`" x-text="selectedJob.status"></span>
                        </div>
                        <button @click="selectedJob = null" class="text-gray-400 hover:text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Modal Body -->
                    <div class="p-6 space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-400">Job ID</p>
                                <p class="font-mono text-sm mt-1" x-text="selectedJob.id"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Type</p>
                                <p class="font-mono text-sm mt-1 uppercase" x-text="selectedJob.type"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Node</p>
                                <p class="text-sm mt-1" x-text="getNodeName(selectedJob.node_id)"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Created</p>
                                <p class="text-sm mt-1" x-text="formatDate(selectedJob.created_at)"></p>
                            </div>
                            <div x-show="selectedJob.started_at">
                                <p class="text-sm text-gray-400">Started</p>
                                <p class="text-sm mt-1" x-text="formatDate(selectedJob.started_at)"></p>
                            </div>
                            <div x-show="selectedJob.completed_at">
                                <p class="text-sm text-gray-400">Completed</p>
                                <p class="text-sm mt-1" x-text="formatDate(selectedJob.completed_at)"></p>
                            </div>
                        </div>

                        <div>
                            <p class="text-sm text-gray-400 mb-2">Command</p>
                            <pre class="bg-gray-900 p-4 rounded-lg text-sm font-mono overflow-x-auto" x-text="getJobCommand(selectedJob)"></pre>
                        </div>

                        <div x-show="selectedJob.result">
                            <p class="text-sm text-gray-400 mb-2">Output</p>
                            <pre class="bg-gray-900 p-4 rounded-lg text-sm font-mono overflow-x-auto max-h-96" x-text="selectedJob.result?.output || 'No output'"></pre>
                        </div>

                        <div x-show="selectedJob.result?.error">
                            <p class="text-sm text-red-400 mb-2">Error</p>
                            <pre class="bg-red-900/20 border border-red-900 p-4 rounded-lg text-sm font-mono overflow-x-auto" x-text="selectedJob.result?.error"></pre>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Job Submit Form Modal -->
    <div x-show="showSubmitForm"
         x-cloak
         @click.self="showSubmitForm = false"
         class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-lg max-w-2xl w-full">
            <div class="flex items-center justify-between p-6 border-b border-gray-700">
                <h3 class="text-xl font-bold">Submit New Job</h3>
                <button @click="showSubmitForm = false" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form @submit.prevent="submitJob" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Job Type</label>
                    <select x-model="newJob.type" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white">
                        <option value="shell">Shell Command</option>
                        <option value="ocr" disabled>OCR (Coming Soon)</option>
                        <option value="sync" disabled>Sync (Coming Soon)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Target Node</label>
                    <select x-model="newJob.node_id" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white">
                        <option value="">Select a node...</option>
                        <template x-for="node in nodes" :key="node.id">
                            <option :value="node.id" x-text="node.name + ' (' + node.ip_address + ')'"></option>
                        </template>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Command</label>
                    <textarea x-model="newJob.command"
                              rows="4"
                              placeholder="ls -la"
                              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white font-mono text-sm"
                              required></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Timeout (seconds)</label>
                    <input type="number"
                           x-model="newJob.timeout"
                           min="1"
                           max="3600"
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white"
                           placeholder="300">
                </div>

                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" @click="showSubmitForm = false" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit" class="btn-primary">
                        Submit Job
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function jobsPage() {
    return {
        jobs: [],
        nodes: [],
        filterStatus: 'all',
        selectedJob: null,
        showSubmitForm: false,
        newJob: {
            type: 'shell',
            node_id: '',
            command: '',
            timeout: 300
        },

        get stats() {
            return {
                total: this.jobs.length,
                running: this.jobs.filter(j => j.status === 'running' || j.status === 'pending').length,
                completed: this.jobs.filter(j => j.status === 'completed').length,
                failed: this.jobs.filter(j => j.status === 'failed').length
            };
        },

        get filteredJobs() {
            if (this.filterStatus === 'all') {
                return this.jobs;
            }
            if (this.filterStatus === 'running') {
                return this.jobs.filter(j => j.status === 'running' || j.status === 'pending');
            }
            return this.jobs.filter(j => j.status === this.filterStatus);
        },

        async init() {
            await this.loadJobs();
            await this.loadNodes();

            // Set up WebSocket for real-time updates
            if (window.wsClient) {
                window.wsClient.on('job_update', () => {
                    this.loadJobs();
                });
            }

            // Fallback polling
            setInterval(() => this.loadJobs(), 30000);
        },

        async loadJobs() {
            try {
                const response = await fetch('/api/jobs');
                const data = await response.json();
                this.jobs = data.jobs.sort((a, b) =>
                    new Date(b.created_at) - new Date(a.created_at)
                );
            } catch (error) {
                console.error('Failed to load jobs:', error);
            }
        },

        async loadNodes() {
            try {
                const response = await fetch('/api/nodes');
                const data = await response.json();
                this.nodes = data.nodes;
            } catch (error) {
                console.error('Failed to load nodes:', error);
            }
        },

        async submitJob() {
            try {
                const payload = {
                    type: this.newJob.type,
                    node_id: this.newJob.node_id,
                    payload: {
                        command: this.newJob.command,
                        timeout: parseInt(this.newJob.timeout) || 300
                    }
                };

                const response = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    this.showSubmitForm = false;
                    this.newJob = {
                        type: 'shell',
                        node_id: '',
                        command: '',
                        timeout: 300
                    };
                    await this.loadJobs();
                } else {
                    const error = await response.json();
                    alert('Failed to submit job: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Failed to submit job:', error);
                alert('Failed to submit job: ' + error.message);
            }
        },

        getNodeName(nodeId) {
            const node = this.nodes.find(n => n.id === nodeId);
            return node ? node.name : nodeId.substring(0, 8) + '...';
        },

        getJobCommand(job) {
            if (job.type === 'shell') {
                return job.payload.command || 'No command';
            }
            return JSON.stringify(job.payload);
        },

        getJobDuration(job) {
            if (!job.started_at) return '-';
            const end = job.completed_at ? new Date(job.completed_at) : new Date();
            const start = new Date(job.started_at);
            const seconds = Math.floor((end - start) / 1000);
            if (seconds < 60) return `${seconds}s`;
            const minutes = Math.floor(seconds / 60);
            return `${minutes}m ${seconds % 60}s`;
        },

        formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;

            return date.toLocaleString();
        },

        viewJobDetails(job) {
            this.selectedJob = job;
        }
    };
}
</script>
{% endblock %}
