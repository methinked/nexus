{% extends "base.html" %}

{% block content %}
<div class="h-full flex gap-6" x-data="nodesPage()">
    <!-- Left Panel: Nodes List -->
    <div class="w-80 flex-shrink-0 space-y-4">
        <div>
            <h1 class="text-2xl font-bold">Nodes</h1>
            <p class="text-gray-400 text-sm mt-1">Fleet management</p>
        </div>

        <!-- Nodes List -->
        <div class="space-y-2">
            <template x-for="node in nodes" :key="node.id">
                <button @click="selectNode(node.id)"
                    :class="selectedNodeId === node.id ? 'bg-purple-600/20 border-purple-500 ring-1 ring-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'glass-panel hover:bg-white/5 hover:border-white/10'"
                    class="w-full text-left p-4 rounded-lg border transition-all duration-200">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-semibold" x-text="node.name"></span>
                        <span :class="{
                            'bg-green-500/20 text-green-400': node.status === 'online',
                            'bg-red-500/20 text-red-400': node.status === 'offline',
                            'bg-gray-500/20 text-gray-400': node.status === 'unknown'
                        }" class="text-xs px-2 py-1 rounded-full" x-text="node.status"></span>
                    </div>
                    <div class="text-xs text-gray-400 space-y-1">
                        <div x-text="node.ip_address"></div>
                        <div x-text="'Last seen: ' + formatLastSeen(node.last_seen)"></div>
                    </div>
                </button>
            </template>

            <template x-if="nodes.length === 0">
                <div class="text-gray-500 text-center py-8 text-sm">
                    No nodes registered yet
                </div>
            </template>
        </div>
    </div>

    <!-- Right Panel: Node Details -->
    <div class="flex-1 overflow-y-auto space-y-6">
        <template x-if="!selectedNode">
            <div class="text-center py-20 text-gray-500">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
                </svg>
                <p class="font-semibold text-lg">Select a node to view details</p>
                <p class="text-sm mt-2">Choose a node from the list on the left</p>
            </div>
        </template>

        <template x-if="selectedNode">
            <div class="space-y-6">
                <!-- Node Header -->
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" x-text="selectedNode.name"></h2>
                        <p class="text-gray-400 text-sm mt-1" x-text="selectedNode.id"></p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span :class="{
                            'bg-green-500/20 text-green-400 border-green-500/50': selectedNode.status === 'online',
                            'bg-red-500/20 text-red-400 border-red-500/50': selectedNode.status === 'offline',
                            'bg-gray-500/20 text-gray-400 border-gray-500/50': selectedNode.status === 'unknown'
                        }" class="px-3 py-1 rounded-full border text-sm font-semibold"
                            x-text="selectedNode.status.toUpperCase()"></span>
                    </div>
                </div>

                <!-- Node Info Cards -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="card">
                        <div class="card-body">
                            <div class="text-sm text-gray-400 mb-1">IP Address</div>
                            <div class="text-lg font-semibold" x-text="selectedNode.ip_address"></div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <div class="text-sm text-gray-400 mb-1">Last Seen</div>
                            <div class="text-lg font-semibold" x-text="formatLastSeen(selectedNode.last_seen)"></div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <div class="text-sm text-gray-400 mb-1">Location</div>
                            <div class="text-lg font-semibold" x-text="selectedNode.metadata?.location || 'Not set'">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Docker Storage Warning -->
                <div x-show="disks && disks.length > 0" class="card">
                    <template x-for="disk in disks" :key="disk.device">
                        <div x-show="disk.is_docker_data">
                            <div class="card-body">
                                <div class="flex items-start gap-3">
                                    <div x-show="disk.type === 'sd_card'" class="flex-shrink-0 text-amber-400 text-2xl">
                                        ⚠️</div>
                                    <div x-show="disk.type !== 'sd_card'" class="flex-shrink-0 text-green-400 text-2xl">
                                        ✓</div>
                                    <div class="flex-1">
                                        <h3 class="text-lg font-semibold mb-1">Docker Storage</h3>
                                        <template x-if="disk.type === 'sd_card'">
                                            <div>
                                                <div class="text-amber-400 font-semibold mb-2">⚠️ Warning: Docker
                                                    running on SD Card</div>
                                                <div class="text-sm text-gray-300 mb-2">
                                                    Docker is currently using the SD card for storage. This will cause
                                                    premature SD card failure due to excessive writes.
                                                </div>
                                                <div class="text-xs text-gray-400">
                                                    <span class="font-semibold">Location:</span> <span
                                                        x-text="disk.mount_point"></span> •
                                                    <span class="font-semibold">Free:</span> <span
                                                        x-text="formatBytes(disk.free_bytes)"></span>
                                                </div>
                                                <div
                                                    class="mt-2 text-xs bg-amber-500/10 text-amber-300 rounded px-3 py-2 border border-amber-500/20">
                                                    <span class="font-semibold">Recommendation:</span> Connect a USB
                                                    drive or SSD and restart the agent to auto-configure external
                                                    storage
                                                </div>
                                            </div>
                                        </template>
                                        <template x-if="disk.type !== 'sd_card'">
                                            <div>
                                                <div class="text-green-400 font-semibold mb-2">Docker Storage Optimized
                                                </div>
                                                <div class="text-sm text-gray-300 mb-2">
                                                    Docker is using <span
                                                        x-text="formatDiskType(disk.type).toLowerCase()"></span>
                                                    storage, protecting the SD card from excessive writes.
                                                </div>
                                                <div class="text-xs text-gray-400">
                                                    <span class="font-semibold">Type:</span> <span
                                                        x-text="formatDiskType(disk.type)"></span> •
                                                    <span class="font-semibold">Location:</span> <span
                                                        x-text="disk.mount_point"></span> •
                                                    <span class="font-semibold">Free:</span> <span
                                                        x-text="formatBytes(disk.free_bytes)"></span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Health Status -->
                <div class="card" x-show="healthStatus">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">Health Status</h3>
                        <div class="grid grid-cols-5 gap-4">
                            <div class="text-center">
                                <div :class="{
                                    'text-green-400': healthStatus?.overall_health === 'healthy',
                                    'text-amber-400': healthStatus?.overall_health === 'warning',
                                    'text-red-400': healthStatus?.overall_health === 'critical',
                                    'text-gray-400': healthStatus?.overall_health === 'unknown'
                                }" class="text-3xl font-bold mb-1"
                                    x-text="healthStatus?.overall_health ? healthStatus.overall_health.toUpperCase() : 'N/A'">
                                </div>
                                <div class="text-xs text-gray-400">Overall</div>
                            </div>
                            <div class="text-center">
                                <div :class="{
                                    'text-green-400': healthStatus?.cpu_health === 'healthy',
                                    'text-amber-400': healthStatus?.cpu_health === 'warning',
                                    'text-red-400': healthStatus?.cpu_health === 'critical'
                                }" class="text-xl font-semibold mb-1"
                                    x-text="healthStatus?.latest_metrics?.cpu_percent ? healthStatus.latest_metrics.cpu_percent.toFixed(1) + '%' : 'N/A'">
                                </div>
                                <div class="text-xs text-gray-400">CPU</div>
                            </div>
                            <div class="text-center">
                                <div :class="{
                                    'text-green-400': healthStatus?.memory_health === 'healthy',
                                    'text-amber-400': healthStatus?.memory_health === 'warning',
                                    'text-red-400': healthStatus?.memory_health === 'critical'
                                }" class="text-xl font-semibold mb-1"
                                    x-text="healthStatus?.latest_metrics?.memory_percent ? healthStatus.latest_metrics.memory_percent.toFixed(1) + '%' : 'N/A'">
                                </div>
                                <div class="text-xs text-gray-400">Memory</div>
                            </div>
                            <div class="text-center">
                                <div :class="{
                                    'text-green-400': healthStatus?.disk_health === 'healthy',
                                    'text-amber-400': healthStatus?.disk_health === 'warning',
                                    'text-red-400': healthStatus?.disk_health === 'critical'
                                }" class="text-xl font-semibold mb-1"
                                    x-text="healthStatus?.latest_metrics?.disk_percent ? healthStatus.latest_metrics.disk_percent.toFixed(1) + '%' : 'N/A'">
                                </div>
                                <div class="text-xs text-gray-400">Disk</div>
                            </div>
                            <div class="text-center">
                                <div :class="{
                                    'text-green-400': healthStatus?.temperature_health === 'healthy',
                                    'text-amber-400': healthStatus?.temperature_health === 'warning',
                                    'text-red-400': healthStatus?.temperature_health === 'critical',
                                    'text-gray-400': !healthStatus?.latest_metrics?.temperature
                                }" class="text-xl font-semibold mb-1"
                                    x-text="healthStatus?.latest_metrics?.temperature ? healthStatus.latest_metrics.temperature.toFixed(1) + '°C' : 'N/A'">
                                </div>
                                <div class="text-xs text-gray-400">Temp</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Metrics Charts -->
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">Real-time Metrics (Last 50 readings)</h3>

                        <template x-if="!latestMetrics || latestMetrics.length === 0">
                            <div class="text-center py-12 text-gray-500">
                                <p>Loading metrics...</p>
                            </div>
                        </template>

                        <template x-if="latestMetrics && latestMetrics.length > 0">
                            <div class="grid grid-cols-2 gap-6">
                                <!-- CPU Chart -->
                                <div class="relative h-48">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="text-sm font-semibold text-gray-400">CPU Usage</h4>
                                        <span class="text-2xl font-bold text-purple-400"
                                            x-text="latestMetrics[0]?.cpu_percent.toFixed(1) + '%'"></span>
                                    </div>
                                    <div class="absolute inset-0 top-8">
                                        <canvas :id="'chart-cpu-' + selectedNode.id"></canvas>
                                    </div>
                                </div>

                                <!-- Memory Chart -->
                                <div class="relative h-48">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="text-sm font-semibold text-gray-400">Memory Usage</h4>
                                        <span class="text-2xl font-bold text-blue-400"
                                            x-text="latestMetrics[0]?.memory_percent.toFixed(1) + '%'"></span>
                                    </div>
                                    <div class="absolute inset-0 top-8">
                                        <canvas :id="'chart-memory-' + selectedNode.id"></canvas>
                                    </div>
                                </div>

                                <!-- Disk Chart -->
                                <div class="relative h-48">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="text-sm font-semibold text-gray-400">Disk Usage</h4>
                                        <span class="text-2xl font-bold text-green-400"
                                            x-text="latestMetrics[0]?.disk_percent.toFixed(1) + '%'"></span>
                                    </div>
                                    <div class="absolute inset-0 top-8">
                                        <canvas :id="'chart-disk-' + selectedNode.id"></canvas>
                                    </div>
                                </div>

                                <!-- Temperature Chart -->
                                <div class="relative h-48">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="text-sm font-semibold text-gray-400">Temperature</h4>
                                        <span class="text-2xl font-bold text-amber-400"
                                            x-text="latestMetrics[0]?.temperature ? latestMetrics[0].temperature.toFixed(1) + '°C' : 'N/A'"></span>
                                    </div>
                                    <div class="absolute inset-0 top-8">
                                        <canvas :id="'chart-temp-' + selectedNode.id"></canvas>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Containers -->
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">Containers</h3>
                        <div class="space-y-2">
                            <template x-if="!containers || containers.length === 0">
                                <div class="text-gray-500 text-center py-4 text-sm">
                                    No containers found
                                </div>
                            </template>
                            <template x-for="container in containers" :key="container.id">
                                <div
                                    class="flex items-center justify-between p-3 bg-gray-800/40 border border-white/5 rounded-lg hover:bg-gray-700/40 transition-colors">
                                    <div class="flex items-center space-x-3">
                                        <div :class="{
                                            'bg-green-400': container.status === 'running',
                                            'bg-red-400': container.status === 'exited' || container.status === 'dead',
                                            'bg-amber-400': container.status === 'paused' || container.status === 'restarting',
                                            'bg-gray-400': container.status === 'created'
                                        }" class="w-2 h-2 rounded-full flex-shrink-0"></div>
                                        <div class="overflow-hidden">
                                            <div class="font-medium truncate"
                                                x-text="container.name.replace(/^\//, '')"></div>
                                            <div class="text-xs text-gray-500 truncate" x-text="container.image"
                                                :title="container.image"></div>
                                        </div>
                                    </div>
                                    <div class="text-right flex-shrink-0 ml-2">
                                        <span class="text-sm text-gray-400 capitalize" x-text="container.status"></span>
                                        <div x-show="container.managed" class="text-xs text-purple-400">Nexus Managed
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Storage Devices -->
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">Storage Devices</h3>
                        <div class="space-y-3">
                            <template x-if="disksError">
                                <div class="text-center py-8">
                                    <div class="text-amber-400 mb-2">⚠️ Storage information unavailable</div>
                                    <div class="text-xs text-gray-500">Agent needs to be updated with new storage
                                        detection feature.</div>
                                    <div class="text-xs text-gray-500 mt-1">Run: <code
                                            class="bg-gray-800 px-2 py-1 rounded">./scripts/update-agent.sh</code></div>
                                </div>
                            </template>
                            <template x-if="!disksError && disks && disks.length > 0">
                                <template x-for="disk in disks" :key="disk.device">
                                    <div class="p-3 bg-gray-800/40 border border-white/5 rounded-lg">
                                        <!-- Header with disk type and mount point -->
                                        <div class="flex items-start justify-between mb-2">
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2 mb-1">
                                                    <span class="font-semibold" x-text="disk.mount_point"></span>
                                                    <span :class="{
                                                        'bg-amber-500/20 text-amber-400': disk.type === 'sd_card',
                                                        'bg-purple-500/20 text-purple-400': disk.type === 'external_ssd',
                                                        'bg-blue-500/20 text-blue-400': disk.type === 'external_hdd',
                                                        'bg-pink-500/20 text-pink-400': disk.type === 'nvme',
                                                        'bg-cyan-500/20 text-cyan-400': disk.type === 'usb_flash',
                                                        'bg-gray-500/20 text-gray-400': disk.type === 'unknown'
                                                    }" class="text-xs px-2 py-0.5 rounded-full font-medium"
                                                        x-text="formatDiskType(disk.type)"></span>
                                                </div>
                                                <div class="text-xs text-gray-500"
                                                    x-text="disk.device + ' • ' + disk.filesystem"></div>
                                            </div>
                                            <div class="text-right">
                                                <div :class="{
                                                    'text-green-400': disk.usage_percent < 80,
                                                    'text-amber-400': disk.usage_percent >= 80 && disk.usage_percent < 95,
                                                    'text-red-400': disk.usage_percent >= 95
                                                }" class="text-lg font-bold"
                                                    x-text="disk.usage_percent.toFixed(1) + '%'"></div>
                                                <div class="text-xs text-gray-500"
                                                    x-text="formatBytes(disk.free_bytes) + ' free'"></div>
                                            </div>
                                        </div>

                                        <!-- Progress bar -->
                                        <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                                            <div :class="{
                                                'bg-green-500': disk.usage_percent < 80,
                                                'bg-amber-500': disk.usage_percent >= 80 && disk.usage_percent < 95,
                                                'bg-red-500': disk.usage_percent >= 95
                                            }" class="h-2 rounded-full transition-all"
                                                :style="`width: ${disk.usage_percent}%`"></div>
                                        </div>

                                        <!-- Badges -->
                                        <div class="flex flex-wrap gap-1">
                                            <span x-show="disk.is_system"
                                                class="text-xs px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400">System</span>
                                            <span x-show="disk.is_docker_data"
                                                class="text-xs px-2 py-0.5 rounded-full bg-cyan-500/20 text-cyan-400">Docker
                                                Data</span>
                                            <span x-show="disk.is_nexus_data"
                                                class="text-xs px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-400">Nexus
                                                Data</span>
                                            <span x-show="disk.read_only"
                                                class="text-xs px-2 py-0.5 rounded-full bg-red-500/20 text-red-400">Read-Only</span>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            <template x-if="!disksError && (!disks || disks.length === 0)">
                                <div class="text-gray-500 text-center py-4 text-sm">
                                    Loading disk information...
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Recent Jobs -->
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">Recent Jobs</h3>
                        <div class="space-y-2">
                            <template x-for="job in recentJobs" :key="job.id">
                                <div
                                    class="flex items-center justify-between p-3 bg-gray-800/40 border border-white/5 rounded-lg">
                                    <div>
                                        <div class="font-medium" x-text="job.type"></div>
                                        <div class="text-xs text-gray-400" x-text="job.id.substr(0, 8)"></div>
                                    </div>
                                    <span :class="{
                                        'bg-green-500/20 text-green-400': job.status === 'completed',
                                        'bg-blue-500/20 text-blue-400': job.status === 'running',
                                        'bg-amber-500/20 text-amber-400': job.status === 'pending',
                                        'bg-red-500/20 text-red-400': job.status === 'failed'
                                    }" class="text-xs px-2 py-1 rounded-full" x-text="job.status"></span>
                                </div>
                            </template>
                            <template x-if="recentJobs.length === 0">
                                <div class="text-gray-500 text-center py-4 text-sm">
                                    No recent jobs
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Recent Logs -->
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">Recent Logs</h3>
                        <div class="space-y-1 font-mono text-xs max-h-64 overflow-y-auto">
                            <template x-for="log in recentLogs" :key="log.id">
                                <div
                                    class="p-2 bg-gray-900/50 border border-white/5 rounded text-[10px] md:text-xs font-mono">
                                    <span :class="{
                                        'text-red-400': log.level === 'ERROR' || log.level === 'CRITICAL',
                                        'text-amber-400': log.level === 'WARNING',
                                        'text-blue-400': log.level === 'INFO',
                                        'text-gray-400': log.level === 'DEBUG'
                                    }" x-text="log.level"></span>
                                    <span class="text-gray-500"
                                        x-text="' | ' + new Date(log.timestamp).toLocaleTimeString()"></span>
                                    <span class="text-gray-300" x-text="' | ' + log.message"></span>
                                </div>
                            </template>
                            <template x-if="recentLogs.length === 0">
                                <div class="text-gray-500 text-center py-4">
                                    No recent logs
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
    function nodesPage() {
        return {
            nodes: [],
            selectedNodeId: null,
            selectedNode: null,
            healthStatus: null,
            containers: [],
            disks: [],
            disksError: false,
            recentJobs: [],
            recentLogs: [],
            latestMetrics: [],
            charts: {},
            refreshInterval: null,

            async init() {
                await this.loadNodes();
                // Auto-select first node if available
                if (this.nodes.length > 0) {
                    await this.selectNode(this.nodes[0].id);
                }

                // Setup WebSocket listeners for real-time updates
                this.setupWebSocket();
            },

            setupWebSocket() {
                // Handle metric updates
                window.nexusWS.on('metric_update', (data) => {
                    // If this is for the selected node, refresh its data
                    if (data.node_id === this.selectedNodeId) {
                        console.log('[Nodes] Metric update for selected node');
                        this.refreshNodeData(this.selectedNodeId);
                    }
                    // Also refresh node list to update last_seen times
                    this.loadNodes();
                });

                // Handle WebSocket fallback to polling
                window.nexusWS.on('fallback_to_polling', () => {
                    console.log('[Nodes] Enabling polling fallback');
                    this.enablePolling();
                });

                // Re-disable polling if WebSocket reconnects
                window.nexusWS.on('connected', () => {
                    console.log('[Nodes] WebSocket reconnected, disabling polling');
                    this.disablePolling();
                });
            },

            enablePolling() {
                if (!this.refreshInterval) {
                    this.refreshInterval = setInterval(() => {
                        this.loadNodes();
                        if (this.selectedNodeId) {
                            this.refreshNodeData(this.selectedNodeId);
                        }
                    }, 30000);
                }
            },

            disablePolling() {
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }
            },

            async loadNodes() {
                try {
                    const response = await fetch('/api/nodes');
                    const data = await response.json();
                    this.nodes = data.nodes || [];
                } catch (error) {
                    console.error('Failed to load nodes:', error);
                }
            },

            async selectNode(nodeId) {
                this.selectedNodeId = nodeId;
                this.selectedNode = this.nodes.find(n => n.id === nodeId);

                // Clear old charts when switching nodes
                Object.values(this.charts).forEach(chart => chart.destroy());
                this.charts = {};

                await this.loadNodeDetails(nodeId);
            },

            async loadNodeDetails(nodeId) {
                try {
                    // Load health status
                    const healthResponse = await fetch(`/api/nodes/${nodeId}/health`);
                    this.healthStatus = await healthResponse.json();

                    // Load metrics and create charts
                    const metricsResponse = await fetch(`/api/metrics/${nodeId}?limit=50`);
                    const metricsData = await metricsResponse.json();
                    this.latestMetrics = (metricsData.metrics || []).reverse(); // Newest first
                    this.createCharts(this.latestMetrics);

                    // Load recent jobs
                    const jobsResponse = await fetch(`/api/jobs?node_id=${nodeId}&limit=5`);
                    const jobsData = await jobsResponse.json();
                    this.recentJobs = jobsData.jobs || [];

                    // Load recent logs
                    const logsResponse = await fetch(`/api/logs/${nodeId}?limit=20`);
                    const logsData = await logsResponse.json();
                    this.recentLogs = logsData.logs || [];

                    // Load disk information
                    try {
                        const disksResponse = await fetch(`/api/nodes/${nodeId}/disks`);
                        if (disksResponse.ok) {
                            this.disks = await disksResponse.json();
                            this.disksError = false;
                        } else {
                            console.warn('Failed to load disk information:', disksResponse.status);
                            this.disks = [];
                            this.disksError = true;
                        }
                    } catch (error) {
                        console.warn('Failed to load disk information:', error);
                        this.disks = [];
                        this.disksError = true;
                    }

                    // Load containers
                    try {
                        const containersResponse = await fetch(`/api/nodes/${nodeId}/containers?show_all=true`);
                        if (containersResponse.ok) {
                            const data = await containersResponse.json();
                            this.containers = data.containers || [];
                        } else {
                            this.containers = [];
                        }
                    } catch (error) {
                        console.warn('Failed to load containers:', error);
                        this.containers = [];
                    }
                } catch (error) {
                    console.error('Failed to load node details:', error);
                }
            },

            async refreshNodeData(nodeId) {
                try {
                    // Refresh metrics and update charts
                    const metricsResponse = await fetch(`/api/metrics/${nodeId}?limit=50`);
                    const metricsData = await metricsResponse.json();
                    this.latestMetrics = (metricsData.metrics || []).reverse(); // Newest first
                    this.updateChartData(this.latestMetrics);

                    // Refresh health status
                    const healthResponse = await fetch(`/api/nodes/${nodeId}/health`);
                    this.healthStatus = await healthResponse.json();
                } catch (error) {
                    console.error('Failed to refresh node data:', error);
                }
            },

            createCharts(metrics) {
                if (!metrics || metrics.length === 0) return;

                const nodeId = this.selectedNodeId;

                // Wait for DOM
                this.$nextTick(() => {
                    const cpuEl = document.getElementById(`chart-cpu-${nodeId}`);
                    if (cpuEl && !this.charts.cpu) {
                        const ctx = cpuEl.getContext('2d');
                        this.charts.cpu = NexusCharts.createTimeSeriesChart(ctx, 'CPU %', 'purple', {
                            unit: '%',
                            scales: { y: { max: 100 } }
                        });
                    }

                    const memEl = document.getElementById(`chart-memory-${nodeId}`);
                    if (memEl && !this.charts.memory) {
                        const ctx = memEl.getContext('2d');
                        this.charts.memory = NexusCharts.createTimeSeriesChart(ctx, 'Memory %', 'blue', {
                            unit: '%',
                            scales: { y: { max: 100 } }
                        });
                    }

                    const diskEl = document.getElementById(`chart-disk-${nodeId}`);
                    if (diskEl && !this.charts.disk) {
                        const ctx = diskEl.getContext('2d');
                        this.charts.disk = NexusCharts.createTimeSeriesChart(ctx, 'Disk %', 'green', {
                            unit: '%',
                            scales: { y: { max: 100 } }
                        });
                    }

                    const tempEl = document.getElementById(`chart-temp-${nodeId}`);
                    if (tempEl && !this.charts.temp) {
                        const ctx = tempEl.getContext('2d');
                        this.charts.temp = NexusCharts.createTimeSeriesChart(ctx, 'Temperature', 'amber', {
                            unit: '°C',
                            scales: { y: { min: 30, max: 80 } }
                        });
                    }

                    // Populate initial data
                    this.updateChartData(metrics);
                });
            },

            updateChartData(metrics) {
                if (!metrics || metrics.length === 0 || Object.keys(this.charts).length === 0) return;

                // NexusCharts.updateChartData expects standard metric objects.
                // Our metrics array is newest-first? buildCharts expects that but updateChartData sorts it.
                // Let's pass it as is.

                if (this.charts.cpu) NexusCharts.updateChartData(this.charts.cpu, metrics, 'cpu_percent');
                if (this.charts.memory) NexusCharts.updateChartData(this.charts.memory, metrics, 'memory_percent');
                if (this.charts.disk) NexusCharts.updateChartData(this.charts.disk, metrics, 'disk_percent');
                if (this.charts.temp) NexusCharts.updateChartData(this.charts.temp, metrics, 'temperature');
            },

            formatLastSeen(timestamp) {
                if (!timestamp) return 'Never';
                const date = new Date(timestamp);
                const now = new Date();
                const diffMs = now - date;
                const diffSecs = Math.floor(diffMs / 1000);
                const diffMins = Math.floor(diffSecs / 60);
                const diffHours = Math.floor(diffMins / 60);

                if (diffSecs < 60) return `${diffSecs}s ago`;
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                return date.toLocaleDateString();
            },

            formatDiskType(type) {
                const typeMap = {
                    'sd_card': 'SD Card',
                    'external_ssd': 'External SSD',
                    'external_hdd': 'External HDD',
                    'nvme': 'NVMe',
                    'usb_flash': 'USB Flash',
                    'unknown': 'Unknown'
                };
                return typeMap[type] || type;
            },

            formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }
        };
    }
</script>
