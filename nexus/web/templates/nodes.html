{% extends "base.html" %}

{% block content %}
<div class="h-full flex gap-6" x-data="nodesPageOptimized()">
    <!-- Left Panel: Nodes List -->
    <div class="w-80 flex-shrink-0 space-y-4">
        <div>
            <h1 class="text-2xl font-bold">Nodes</h1>
            <p class="text-gray-400 text-sm mt-1">Fleet management</p>
        </div>

        <!-- WebSocket Status Indicator -->
        <div x-show="!wsConnected"
            class="p-2 bg-amber-500/10 border border-amber-500/30 rounded text-xs text-amber-400">
            ⚠️ Real-time updates disconnected
        </div>

        <!-- Nodes List -->
        <div class="space-y-2">
            <!-- Loading Skeleton -->
            <template x-if="nodes.length === 0 && !nodesLoaded">
                <div class="space-y-2">
                    <div class="p-4 bg-gray-800/20 border border-white/5 rounded-lg space-y-2">
                        <div class="flex justify-between">
                            <div class="h-4 w-1/3 skeleton"></div>
                            <div class="h-4 w-8 skeleton"></div>
                        </div>
                        <div class="h-3 w-1/2 skeleton"></div>
                    </div>
                </div>
            </template>

            <template x-for="node in nodes" :key="node.id">
                <button @click="selectNode(node.id)"
                    :class="selectedNodeId === node.id ? 'bg-purple-600/20 border-purple-500 ring-1 ring-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'glass-panel hover:bg-white/5 hover:border-white/10'"
                    class="w-full text-left p-4 rounded-lg border transition-all duration-200">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-semibold" x-text="node.name"></span>
                        <span :class="{
                            'bg-green-500/20 text-green-400': node.status === 'online',
                            'bg-red-500/20 text-red-400': node.status === 'offline',
                            'bg-gray-500/20 text-gray-400': node.status === 'unknown'
                        }" class="text-xs px-2 py-1 rounded-full" x-text="node.status"></span>
                    </div>
                    <div class="text-xs text-gray-400 space-y-1">
                        <div x-text="node.ip_address"></div>
                        <div x-text="'Last seen: ' + formatLastSeen(node.last_seen)"></div>
                    </div>
                </button>
            </template>

            <template x-if="nodes.length === 0 && nodesLoaded">
                <div class="text-gray-500 text-center py-8 text-sm">
                    No nodes registered yet
                </div>
            </template>
        </div>
    </div>

    <!-- Right Panel: Node Details (Simplified) -->
    <div class="flex-1 overflow-y-auto space-y-6">
        <template x-if="!selectedNode">
            <div class="text-center py-20 text-gray-500">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
                </svg>
                <p class="font-semibold text-lg">Select a node to view details</p>
                <p class="text-sm mt-2">Choose a node from the list on the left</p>
            </div>
        </template>

        <template x-if="selectedNode">
            <div class="space-y-6">
                <!-- Node Header -->
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" x-text="selectedNode.name"></h2>
                        <p class="text-gray-400 text-sm mt-1" x-text="selectedNode.id"></p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button @click="updateAgent(selectedNode.id)" class="btn btn-primary text-sm px-3 py-1">
                            <span>Update Agent</span>
                        </button>
                        <span :class="{
                            'bg-green-500/20 text-green-400 border-green-500/50': selectedNode.status === 'online',
                            'bg-red-500/20 text-red-400 border-red-500/50': selectedNode.status === 'offline',
                            'bg-gray-500/20 text-gray-400 border-gray-500/50': selectedNode.status === 'unknown'
                        }" class="px-3 py-1 rounded-full border text-sm font-semibold"
                            x-text="selectedNode.status.toUpperCase()"></span>
                    </div>
                </div>

                <!-- Minimal Metrics View -->
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-lg font-semibold mb-4">System Metrics</h3>

                        <template x-if="!nodeCache[selectedNodeId]?.latestMetric">
                            <div class="text-center py-8 text-gray-500">
                                <div class="animate-pulse">Waiting for metrics...</div>
                            </div>
                        </template>

                        <template x-if="nodeCache[selectedNodeId]?.latestMetric">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <!-- CPU -->
                                <div class="text-center p-4 bg-purple-500/10 border border-purple-500/30 rounded-lg">
                                    <div class="text-3xl font-bold text-purple-400"
                                        x-text="nodeCache[selectedNodeId].latestMetric.cpu_percent.toFixed(1) + '%'">
                                    </div>
                                    <div class="text-xs text-gray-400 mt-1">CPU</div>
                                    <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                                        <div class="bg-purple-500 h-1.5 rounded-full transition-all"
                                            :style="`width: ${nodeCache[selectedNodeId].latestMetric.cpu_percent}%`">
                                        </div>
                                    </div>
                                </div>

                                <!-- Memory -->
                                <div class="text-center p-4 bg-blue-500/10 border border-blue-500/30 rounded-lg">
                                    <div class="text-3xl font-bold text-blue-400"
                                        x-text="nodeCache[selectedNodeId].latestMetric.memory_percent.toFixed(1) + '%'">
                                    </div>
                                    <div class="text-xs text-gray-400 mt-1">Memory</div>
                                    <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                                        <div class="bg-blue-500 h-1.5 rounded-full transition-all"
                                            :style="`width: ${nodeCache[selectedNodeId].latestMetric.memory_percent}%`">
                                        </div>
                                    </div>
                                </div>

                                <!-- Disk -->
                                <div class="text-center p-4 bg-green-500/10 border border-green-500/30 rounded-lg">
                                    <div class="text-3xl font-bold text-green-400"
                                        x-text="nodeCache[selectedNodeId].latestMetric.disk_percent.toFixed(1) + '%'">
                                    </div>
                                    <div class="text-xs text-gray-400 mt-1">Disk</div>
                                    <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                                        <div class="bg-green-500 h-1.5 rounded-full transition-all"
                                            :style="`width: ${nodeCache[selectedNodeId].latestMetric.disk_percent}%`">
                                        </div>
                                    </div>
                                </div>

                                <!-- Temperature -->
                                <div class="text-center p-4 bg-amber-500/10 border border-amber-500/30 rounded-lg">
                                    <div class="text-3xl font-bold text-amber-400"
                                        x-text="nodeCache[selectedNodeId].latestMetric.temperature ? nodeCache[selectedNodeId].latestMetric.temperature.toFixed(1) + '°C' : 'N/A'">
                                    </div>
                                    <div class="text-xs text-gray-400 mt-1">Temperature</div>
                                    <div x-show="nodeCache[selectedNodeId].latestMetric.temperature"
                                        class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                                        <div class="bg-amber-500 h-1.5 rounded-full transition-all"
                                            :style="`width: ${Math.min((nodeCache[selectedNodeId].latestMetric.temperature / 80) * 100, 100)}%`">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- Quick Stats -->
                        <div class="grid grid-cols-3 gap-4 mt-6 pt-6 border-t border-white/5">
                            <div class="text-center">
                                <div class="text-2xl font-bold"
                                    x-text="nodeCache[selectedNodeId]?.containers?.length || 0"></div>
                                <div class="text-xs text-gray-400">Containers</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold" x-text="nodeCache[selectedNodeId]?.disks?.length || 0">
                                </div>
                                <div class="text-xs text-gray-400">Storage Devices</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold"
                                    x-text="nodeCache[selectedNodeId]?.recentJobs?.length || 0"></div>
                                <div class="text-xs text-gray-400">Recent Jobs</div>
                            </div>
                        </div>

                        <!-- View Details Button -->
                        <div class="mt-6 text-center">
                            <button @click="showDetails = true" class="btn btn-secondary">
                                📊 View Detailed Information
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Details Modal (Lazy Loaded) -->
    <div x-show="showDetails" x-cloak
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4"
        @click.self="showDetails = false">
        <div class="bg-gray-900 border border-white/10 rounded-lg max-w-6xl w-full max-h-[90vh] overflow-y-auto"
            @click.stop>
            <!-- Modal Header -->
            <div class="sticky top-0 bg-gray-900 border-b border-white/10 p-6 flex items-center justify-between">
                <h2 class="text-2xl font-bold" x-text="selectedNode?.name + ' - Detailed View'"></h2>
                <button @click="showDetails = false" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="p-6 space-y-6">
                <template x-if="nodeCache[selectedNodeId]">
                    <div class="space-y-8">
                        
                        <!-- Details Grid -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            
                            <!-- Containers Section -->
                            <div class="card bg-gray-800/50">
                                <div class="card-header border-b border-white/5 pb-3 mb-3 flex items-center justify-between">
                                    <h3 class="text-lg font-semibold flex items-center gap-2">
                                        <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                        </svg>
                                        Running Containers
                                    </h3>
                                    <span class="px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400 text-xs" x-text="nodeCache[selectedNodeId].containers.length"></span>
                                </div>
                                <div class="card-body overflow-y-auto max-h-[400px] custom-scrollbar space-y-2 pr-2">
                                    <template x-if="nodeCache[selectedNodeId].containers.length === 0">
                                        <div class="text-center py-6 text-gray-500 text-sm">No containers running</div>
                                    </template>
                                    <template x-for="c in nodeCache[selectedNodeId].containers" :key="c.id">
                                        <div class="p-3 bg-black/20 border border-white/5 rounded flex justify-between items-start gap-4 hover:border-blue-500/30 transition-colors">
                                            <div class="min-w-0 flex-1">
                                                <div class="font-medium text-gray-200 truncate" x-text="(c.name || '').replace(/^\//, '')"></div>
                                                <div class="text-xs text-gray-500 truncate" x-text="c.image"></div>
                                                
                                                <div class="flex flex-wrap gap-2 text-[10px] font-mono mt-2">
                                                    <template x-if="c.ports">
                                                        <div class="px-2 py-1 bg-black/40 rounded border border-white/5 text-gray-300">
                                                            <span class="text-gray-500 font-bold">PORTS:</span> <span x-text="c.ports"></span>
                                                        </div>
                                                    </template>
                                                    <template x-if="c.cpu_percent !== undefined">
                                                        <div class="px-2 py-1 bg-black/40 rounded border border-white/5 text-gray-300">
                                                            <span class="text-gray-500 font-bold">CPU:</span> <span x-text="c.cpu_percent.toFixed(1) + '%'"></span>
                                                        </div>
                                                    </template>
                                                    <template x-if="c.memory_percent !== undefined">
                                                        <div class="px-2 py-1 bg-black/40 rounded border border-white/5 text-gray-300">
                                                            <span class="text-gray-500 font-bold">MEM:</span> <span x-text="c.memory_percent.toFixed(1) + '%'"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="flex-shrink-0 text-right">
                                                <div :class="{
                                                    'text-green-400': c.status === 'running',
                                                    'text-red-400': c.status === 'exited' || c.status === 'dead',
                                                    'text-amber-400': c.status !== 'running' && c.status !== 'exited' && c.status !== 'dead'
                                                }" class="text-xs font-semibold capitalize" x-text="c.status"></div>
                                                <template x-if="c.managed">
                                                    <div class="text-[10px] text-purple-400 mt-1 uppercase tracking-wider">Managed</div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            
                            <!-- Right Column (Storage & Jobs) -->
                            <div class="space-y-6 flex flex-col">
                                <!-- Storage Section -->
                                <div class="card bg-gray-800/50 flex-1">
                                    <div class="card-header border-b border-white/5 pb-3 mb-3 flex items-center justify-between">
                                        <h3 class="text-lg font-semibold flex items-center gap-2">
                                            <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                                            </svg>
                                            Storage Devices
                                        </h3>
                                        <span class="px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 text-xs" x-text="nodeCache[selectedNodeId].disks.length"></span>
                                    </div>
                                    <div class="card-body overflow-y-auto max-h-[250px] custom-scrollbar space-y-2 pr-2">
                                        <template x-if="nodeCache[selectedNodeId].disks.length === 0">
                                            <div class="text-center py-6 text-gray-500 text-sm">No storage devices found</div>
                                        </template>
                                        <template x-for="d in nodeCache[selectedNodeId].disks" :key="d.mountpoint">
                                            <div class="p-3 bg-black/20 border border-white/5 rounded space-y-2 hover:border-green-500/30 transition-colors">
                                                <div class="flex justify-between items-center text-sm">
                                                    <div class="font-medium text-gray-200" x-text="d.mountpoint"></div>
                                                    <div class="text-gray-400 font-mono text-xs" x-text="d.fstype"></div>
                                                </div>
                                                
                                                <!-- Progress Bar -->
                                                <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                                                    <div :class="{
                                                        'bg-red-500': d.percent > 90,
                                                        'bg-amber-500': d.percent > 75 && d.percent <= 90,
                                                        'bg-green-500': d.percent <= 75
                                                    }" class="h-1.5 rounded-full transition-all" :style="`width: ${d.percent}%`">
                                                    </div>
                                                </div>
                                                
                                                <div class="flex justify-between text-xs text-gray-500 mt-1">
                                                    <span x-text="`${(d.used / (1024*1024*1024)).toFixed(1)} GB used`"></span>
                                                    <span x-text="`${(d.total / (1024*1024*1024)).toFixed(1)} GB total (${d.percent}%)`"></span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                                
                                <!-- Recent Jobs Section -->
                                <div class="card bg-gray-800/50 flex-1">
                                    <div class="card-header border-b border-white/5 pb-3 mb-3 flex items-center justify-between">
                                        <h3 class="text-lg font-semibold flex items-center gap-2">
                                            <svg class="w-5 h-5 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                            </svg>
                                            Recent System Logs
                                        </h3>
                                    </div>
                                    <div class="card-body overflow-y-auto max-h-[150px] custom-scrollbar text-sm font-mono p-2 bg-black/40 rounded border border-white/5">
                                        <template x-if="(!nodeCache[selectedNodeId].recentLogs || nodeCache[selectedNodeId].recentLogs.length === 0)">
                                            <div class="text-center py-4 text-gray-600">No recent logs available</div>
                                        </template>
                                        <div class="space-y-1">
                                            <template x-for="log in nodeCache[selectedNodeId].recentLogs" :key="log.id">
                                                <div class="flex gap-2">
                                                    <span class="text-gray-500 whitespace-nowrap" x-text="new Date(log.timestamp).toLocaleTimeString()"></span>
                                                    <span :class="{
                                                        'text-red-400': log.level === 'ERROR' || log.level === 'CRITICAL',
                                                        'text-amber-400': log.level === 'WARNING',
                                                        'text-blue-400': log.level === 'INFO',
                                                        'text-gray-400': log.level === 'DEBUG'
                                                    }" class="w-16 font-bold" x-text="log.level"></span>
                                                    <span class="text-gray-300 break-all" x-text="log.message"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/nexus-ui.js"></script>
<script>
    function nodesPageOptimized() {
        return {
            nodes: [],
            nodesLoaded: false,
            selectedNodeId: null,
            selectedNode: null,
            nodeCache: {}, // In-memory cache: {nodeId: {latestMetric, containers, disks, jobs, logs}}
            wsConnected: false,
            showDetails: false,

            async init() {
                console.log('[NodesPage] Initializing optimized version');

                // Load initial node list
                await this.loadNodes();

                // Connect to WebSocket for real-time updates
                this.connectWebSocket();

                // Auto-select first node if available
                if (this.nodes.length > 0) {
                    this.selectNode(this.nodes[0].id);
                }

                // Initial data load for all nodes
                await this.loadAllNodeData();
            },

            async loadNodes() {
                try {
                    const response = await fetch('/api/nodes');
                    const data = await response.json();
                    this.nodes = data.nodes || [];
                    this.nodesLoaded = true;
                    console.log('[NodesPage] Loaded', this.nodes.length, 'nodes');
                } catch (error) {
                    console.error('[NodesPage] Failed to load nodes:', error);
                    this.nodesLoaded = true;
                }
            },

            async loadAllNodeData() {
                console.log('[NodesPage] Loading initial data for all nodes');
                const promises = this.nodes.map(node => this.loadNodeData(node.id));
                await Promise.all(promises);
                console.log('[NodesPage] All node data cached');
            },

            async loadNodeData(nodeId) {
                try {
                    const response = await fetch(`/api/nodes/${nodeId}/overview`);
                    if (!response.ok) return;

                    const overview = await response.json();

                    // Cache all data for this node
                    this.nodeCache[nodeId] = {
                        latestMetric: overview.metrics && overview.metrics.length > 0 ? overview.metrics[0] : null,
                        health: overview.health,
                        containers: overview.containers || [],
                        disks: overview.disks || [],
                        recentJobs: overview.jobs || [],
                        recentLogs: overview.logs || []
                    };

                    console.log('[NodesPage] Cached data for node', nodeId);
                } catch (error) {
                    console.error('[NodesPage] Failed to load data for node', nodeId, error);
                }
            },

            selectNode(nodeId) {
                console.log('[NodesPage] Selecting node', nodeId, '(instant - from cache)');
                this.selectedNodeId = nodeId;
                this.selectedNode = this.nodes.find(n => n.id === nodeId);

                // If we don't have cached data yet, load it
                if (!this.nodeCache[nodeId]) {
                    this.loadNodeData(nodeId);
                }
            },

            connectWebSocket() {
                if (!window.nexusWS) {
                    console.warn('[NodesPage] WebSocket client not available');
                    return;
                }

                // Listen for connection events
                window.nexusWS.on('connected', () => {
                    this.wsConnected = true;
                    console.log('[NodesPage] WebSocket connected');
                });

                window.nexusWS.on('disconnected', () => {
                    this.wsConnected = false;
                    console.log('[NodesPage] WebSocket disconnected');
                });

                // Listen for metric updates
                window.nexusWS.on('metric_update', (data) => {
                    console.log('[NodesPage] Received metric update for node', data.node_id);
                    this.handleMetricUpdate(data);
                });

                // Check if already connected
                if (window.nexusWS.connected) {
                    this.wsConnected = true;
                }
            },

            handleMetricUpdate(data) {
                const nodeId = data.node_id;

                // Update cache with new metric
                if (!this.nodeCache[nodeId]) {
                    this.nodeCache[nodeId] = {};
                }

                this.nodeCache[nodeId].latestMetric = {
                    cpu_percent: data.cpu_percent,
                    memory_percent: data.memory_percent,
                    disk_percent: data.disk_percent,
                    temperature: data.temperature,
                    timestamp: data.timestamp
                };

                // Update node last_seen in list
                const node = this.nodes.find(n => n.id === nodeId);
                if (node) {
                    node.last_seen = data.timestamp;
                    node.status = 'online';
                }

                console.log('[NodesPage] Updated cache for node', nodeId);
            },

            async updateAgent(nodeId) {
                if (!confirm('Are you sure you want to update this agent? It will restart.')) return;

                try {
                    const response = await fetch(`/api/update/nodes/${nodeId}/update`, {
                        method: 'POST'
                    });

                    if (response.ok) {
                        alert('Update job submitted. Check the Jobs tab for progress.');
                        // Reload node data
                        await this.loadNodeData(nodeId);
                    } else {
                        alert('Failed to submit update job');
                    }
                } catch (error) {
                    console.error('Failed to update agent:', error);
                    alert('Error submitting update job');
                }
            },

            formatLastSeen(timestamp) {
                if (!timestamp) return 'Never';
                const date = new Date(timestamp);
                const now = new Date();
                const diff = Math.floor((now - date) / 1000); // seconds

                if (diff < 60) return 'Just now';
                if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
                if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
                return `${Math.floor(diff / 86400)}d ago`;
            }
        };
    }
</script>
{% endblock %}
